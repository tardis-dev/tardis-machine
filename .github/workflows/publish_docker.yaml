name: Publish Existing Version To Docker Hub

on:
  workflow_dispatch:
    inputs:
      version:
        description: Published tardis-machine npm version
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish Existing Version To Docker Hub
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: tardisdev/tardis-machine
      NPM_CONFIG_MIN_RELEASE_AGE: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js v25.8.2
        uses: actions/setup-node@v5
        with:
          node-version: 25.8.2

      - name: Verify Published NPM Version
        env:
          VERSION: ${{ inputs.version }}
        run: test "$(npm view "tardis-machine@$VERSION" version)" = "$VERSION"

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login To Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build And Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION_ARG=${{ inputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ inputs.version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Logout From Docker Hub
        run: docker logout
        if: ${{ always() }}
        continue-on-error: true
